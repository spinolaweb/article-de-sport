/* ══ PROGRESSIVE IMAGE LOADING — YouTube-style blur-up ══════
   Strategy:
   1. img starts invisible + blurred (CSS default state)
   2. When img fires onload → add .img-loaded to wrapper
   3. CSS transition smoothly reveals the full quality image
   4. For hero: already marked .img-hero → instant, no blur
   This fires even for cached images (from preload hints)
══════════════════════════════════════════════════════════════ */
function initProgressiveImages(){
  // Hero: always instant (above fold, preloaded)
  var heroWrap = document.getElementById('heroWrap');
  var heroImg  = document.getElementById('heroImg');
  // Mark hero as loaded immediately — or on load if not cached
  if(heroImg.complete && heroImg.naturalWidth){
    heroWrap.classList.add('img-loaded');
  } else {
    heroImg.addEventListener('load', function(){
      heroWrap.classList.add('img-loaded');
    }, {once:true});
  }

  // Below-fold images: blur-up on load
  var belowFold = [
    {wrap:'benefitsWrap', img:'img3'},
    {wrap:'offerWrap',    img:'img4'}
  ];
  belowFold.forEach(function(item){
    var wrap = document.getElementById(item.wrap);
    var img  = document.getElementById(item.img);
    if(!wrap || !img) return;
    function markLoaded(){
      // Small rAF delay so the blur-up transition is visible and smooth
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          wrap.classList.add('img-loaded');
        });
      });
    }
    if(img.complete && img.naturalWidth){
      markLoaded();
    } else {
      img.addEventListener('load', markLoaded, {once:true});
      img.addEventListener('error', function(){ wrap.classList.add('img-loaded'); }, {once:true});
    }
  });
}
